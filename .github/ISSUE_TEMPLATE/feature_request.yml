name: Feature Request
about: Suggest a high-value improvement to ShipMCP
labels: enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What repeated pain point are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Expected impact
      description: Why is this worth adding to the product now?
